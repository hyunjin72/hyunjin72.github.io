---
layout: default
scrolly_nav: _sections
---

<main>
  {% assign sorted_sections = site.sections | sort: 'order' %}
  {% for section in sorted_sections %}
    {{ section.content }}
  {% endfor %}
</main>

<script>
  (function () {
    var els = document.querySelectorAll('.r-reveal');
    if (!('IntersectionObserver' in window)) {
      els.forEach(function (el) { el.classList.add('r-visible'); });
      return;
    }
    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) {
          e.target.classList.add('r-visible');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });
    els.forEach(function (el) { io.observe(el); });
  })();
</script>
